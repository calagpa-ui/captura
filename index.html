<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Captura">
<link rel="manifest" href="manifest.json">
<title>Captura rápida</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    gap: 32px;
  }
  h1 { font-size: 15px; font-weight: 500; color: #888; letter-spacing: 0.05em; text-transform: uppercase; }

  #main-btn {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #4f46e5, #7c3aed);
    color: white;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #main-btn:active { transform: scale(0.94); }
  #main-btn.listening {
    animation: pulse 1.5s infinite;
    background: linear-gradient(145deg, #dc2626, #b91c1c);
  }
  #main-btn svg { width: 40px; height: 40px; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
    70%  { box-shadow: 0 0 0 20px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  }

  #input-area {
    width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #text-input {
    width: 100%;
    background: #1c1c1e;
    border: 1px solid #333;
    border-radius: 14px;
    color: #fff;
    font-size: 15px;
    padding: 14px 16px;
    outline: none;
    resize: none;
    line-height: 1.5;
    min-height: 60px;
  }
  #text-input::placeholder { color: #555; }
  #text-input:focus { border-color: #7c3aed; }
  #send-btn {
    align-self: flex-end;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  #send-btn:disabled { background: #333; color: #666; cursor: default; }

  #status { font-size: 13px; color: #888; min-height: 18px; text-align: center; }
  #status.processing { color: #a78bfa; }
  #status.success    { color: #34d399; }
  #status.error      { color: #f87171; }

  #history { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 8px; }
  #history h2 { font-size: 12px; font-weight: 500; color: #555; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .hist-item {
    background: #1c1c1e; border-radius: 12px; padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .hist-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .hist-icon.event { background: #1e3a5f; }
  .hist-icon.task  { background: #1a3a2a; }
  .hist-text { flex: 1; }
  .hist-title { font-size: 14px; font-weight: 500; color: #e5e5e5; }
  .hist-meta  { font-size: 12px; color: #666; margin-top: 2px; }
  .hist-type  { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; }
  .hist-type.event { background: #1e3a5f; color: #60a5fa; }
  .hist-type.task  { background: #1a3a2a; color: #34d399; }

  #api-setup {
    width: 100%; max-width: 340px;
    background: #1c1c1e; border-radius: 14px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #api-setup p { font-size: 13px; color: #888; }
  #api-setup input {
    width: 100%; background: #111; border: 1px solid #333; border-radius: 10px;
    color: #fff; font-size: 13px; padding: 10px 12px; outline: none;
  }
  #api-setup input:focus { border-color: #7c3aed; }
  #save-key-btn {
    background: #7c3aed; color: white; border: none; border-radius: 10px;
    padding: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
</style>
</head>
<body>

<h1>Captura rápida</h1>

<div id="api-setup" style="display:none">
  <p>Introduce tu API key de Anthropic para activar la app:</p>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." />
  <button id="save-key-btn" onclick="saveKey()">Guardar y continuar</button>
</div>

<button id="main-btn" onclick="toggleMic()" title="Pulsa para hablar" style="display:none">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="2" width="6" height="12" rx="3"/>
    <path d="M5 10a7 7 0 0 0 14 0"/>
    <line x1="12" y1="17" x2="12" y2="22"/>
    <line x1="8" y1="22" x2="16" y2="22"/>
  </svg>
  <span id="btn-label">Hablar</span>
</button>

<div id="input-area" style="display:none">
  <textarea id="text-input" placeholder="O escribe aquí tu tarea o evento..."></textarea>
  <button id="send-btn" onclick="processInput(document.getElementById('text-input').value)">Enviar</button>
</div>

<div id="status"></div>

<div id="history" style="display:none">
  <h2>Recientes</h2>
  <div id="hist-list"></div>
</div>

<script>
const TODAY = new Date().toISOString().slice(0,10);
let recognition = null;
let isListening = false;
let API_KEY = '';

function init() {
  API_KEY = localStorage.getItem('anthropic_key') || '';
  if (API_KEY) showApp();
  else document.getElementById('api-setup').style.display = 'flex';
}

function saveKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k.startsWith('sk-')) { alert('La key debe empezar por sk-ant-...'); return; }
  localStorage.setItem('anthropic_key', k);
  API_KEY = k;
  document.getElementById('api-setup').style.display = 'none';
  showApp();
}

function showApp() {
  document.getElementById('main-btn').style.display = 'flex';
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('history').style.display = 'flex';
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls;
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    setStatus('Usa el campo de texto en este navegador.', 'error'); return;
  }
  if (isListening) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-ES';
  recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('main-btn').classList.add('listening');
    document.getElementById('btn-label').textContent = 'Escuchando…';
    setStatus('Habla ahora…', 'processing');
  };
  recognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    document.getElementById('text-input').value = txt;
    processInput(txt);
  };
  recognition.onerror = () => { setStatus('Error de micrófono.', 'error'); stopMic(); };
  recognition.onend = () => stopMic();
  recognition.start();
}

function stopMic() {
  isListening = false;
  document.getElementById('main-btn').classList.remove('listening');
  document.getElementById('btn-label').textContent = 'Hablar';
}

async function processInput(text) {
  text = text.trim();
  if (!text) return;
  document.getElementById('send-btn').disabled = true;
  setStatus('Clasificando…', 'processing');

  const systemPrompt = `Eres un asistente de productividad. Hoy es ${TODAY}. El usuario está en Madrid, España (Europe/Madrid).
Clasifica la entrada y responde SOLO con JSON válido, sin markdown:
{
  "type": "event" o "task",
  "title": "título corto",
  "date": "YYYY-MM-DD o null",
  "time": "HH:MM o null",
  "duration_minutes": número o null,
  "summary": "título para Calendar",
  "description": "descripción opcional",
  "start": "YYYY-MM-DDTHH:MM:SS o null",
  "end": "YYYY-MM-DDTHH:MM:SS o null",
  "allDay": true o false
}
Si hay fecha/hora específica → event. Si no → task. Infiere fechas relativas desde hoy. Duración por defecto 60 min.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-allow-header': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        system: systemPrompt,
        messages: [{ role: 'user', content: text }]
      })
    });
    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const parsed = JSON.parse(raw.replace(/```json|```/g, '').trim());
    await saveToCalendar(parsed, text);
  } catch(e) {
    console.error(e);
    setStatus('Error al procesar. Inténtalo de nuevo.', 'error');
    document.getElementById('send-btn').disabled = false;
  }
}

async function saveToCalendar(p, originalText) {
  let eventBody = { summary: (p.type === 'task' ? '✅ ' : '') + (p.summary || p.title), description: p.description || originalText };
  if (p.allDay || !p.start) {
    const d = p.date || TODAY;
    eventBody.start = { date: d }; eventBody.end = { date: d };
  } else {
    const end = p.end || addMinutes(p.start, p.duration_minutes || 60);
    eventBody.start = { dateTime: p.start, timeZone: 'Europe/Madrid' };
    eventBody.end   = { dateTime: end,   timeZone: 'Europe/Madrid' };
  }

  try {
    const token = await getGoogleToken();
    const gcRes = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify(eventBody)
    });
    if (!gcRes.ok) throw new Error('Calendar error');
    addToHistory(p);
    document.getElementById('text-input').value = '';
    document.getElementById('send-btn').disabled = false;
    setStatus('✓ Guardado en Google Calendar', 'success');
    setTimeout(() => setStatus(''), 4000);
  } catch(e) {
    console.error(e);
    addToHistory(p);
    document.getElementById('text-input').value = '';
    document.getElementById('send-btn').disabled = false;
    setStatus('Necesitas conectar Google Calendar (ver instrucciones)', 'error');
    setTimeout(() => setStatus(''), 6000);
  }
}

async function getGoogleToken() {
  return new Promise((resolve, reject) => {
    if (!window.google?.accounts?.oauth2) { reject(new Error('Google API no cargada')); return; }
    const client = google.accounts.oauth2.initTokenClient({
      client_id: localStorage.getItem('google_client_id') || '',
      scope: 'https://www.googleapis.com/auth/calendar.events',
      callback: (r) => r.error ? reject(r) : resolve(r.access_token)
    });
    client.requestAccessToken();
  });
}

function addMinutes(dtStr, mins) {
  const d = new Date(dtStr); d.setMinutes(d.getMinutes() + mins);
  return d.toISOString().slice(0,19);
}

function addToHistory(p) {
  const list = document.getElementById('hist-list');
  const item = document.createElement('div');
  item.className = 'hist-item';
  const meta = [p.date, p.time].filter(Boolean).join(' · ') || 'Sin fecha';
  item.innerHTML = `
    <div class="hist-icon ${p.type}">${p.type === 'event' ? '📅' : '✅'}</div>
    <div class="hist-text">
      <div class="hist-title">${p.title}</div>
      <div class="hist-meta">${meta}</div>
      <span class="hist-type ${p.type}">${p.type === 'event' ? 'Evento' : 'Tarea'}</span>
    </div>`;
  list.insertBefore(item, list.firstChild);
  if (list.children.length > 5) list.removeChild(list.lastChild);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
init();
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
