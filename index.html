<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Captura">
<link rel="manifest" href="manifest.json">
<title>Captura rápida</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 20px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f; color: #fff;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px 20px; gap: 32px;
  }
  h1 { font-size: 15px; font-weight: 500; color: #888; letter-spacing: 0.05em; text-transform: uppercase; }
  #main-btn {
    width: 180px; height: 180px; border-radius: 50%; border: none;
    background: linear-gradient(145deg, #4f46e5, #7c3aed);
    color: white; font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    transition: transform 0.15s; -webkit-tap-highlight-color: transparent;
  }
  #main-btn:active { transform: scale(0.94); }
  #main-btn.listening { animation: pulse 1.5s infinite; background: linear-gradient(145deg, #dc2626, #b91c1c); }
  #main-btn svg { width: 56px; height: 56px; }
  #main-btn { font-size: 17px; }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(220,38,38,0.5); }
    70%  { box-shadow: 0 0 0 20px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); }
  }
  #input-area { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px; }
  #text-input {
    width: 100%; background: #1c1c1e; border: 1px solid #333; border-radius: 14px;
    color: #fff; font-size: 15px; padding: 14px 16px; outline: none; resize: none;
    line-height: 1.5; min-height: 60px;
  }
  #text-input::placeholder { color: #555; }
  #text-input:focus { border-color: #7c3aed; }
  #send-btn {
    align-self: flex-end; background: #7c3aed; color: white; border: none;
    border-radius: 10px; padding: 10px 22px; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  #send-btn:disabled { background: #333; color: #666; cursor: default; }
  #status { font-size: 13px; color: #888; min-height: 18px; text-align: center; }
  #status.processing { color: #a78bfa; }
  #status.success    { color: #34d399; }
  #status.error      { color: #f87171; }
  #history { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 8px; }
  #history h2 { font-size: 12px; font-weight: 500; color: #555; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
  .hist-item {
    background: #1c1c1e; border-radius: 12px; padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start; animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .hist-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .hist-icon.event { background: #1e3a5f; }
  .hist-icon.task  { background: #1a3a2a; }
  .hist-text { flex: 1; }
  .hist-title { font-size: 14px; font-weight: 500; color: #e5e5e5; }
  .hist-meta  { font-size: 12px; color: #666; margin-top: 2px; }
  .hist-type  { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; }
  .hist-type.event { background: #1e3a5f; color: #60a5fa; }
  .hist-type.task  { background: #1a3a2a; color: #34d399; }

  #gcal-setup {
    width: 100%; max-width: 340px;
    background: #1c1c1e; border-radius: 14px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #gcal-setup p { font-size: 13px; color: #aaa; line-height: 1.5; }
  #gcal-btn {
    background: #fff; color: #111; border: none; border-radius: 10px;
    padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #skip-btn { background: none; border: none; color: #555; font-size: 13px; cursor: pointer; text-align: center; }
</style>
</head>
<body>

<h1>Captura rápida</h1>

<div id="gcal-setup" style="display:none">
  <p>Conecta Google Calendar para guardar tus tareas y eventos automáticamente.</p>
  <button id="gcal-btn" onclick="connectGoogle()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Conectar Google Calendar
  </button>
  <button id="skip-btn" onclick="skipGoogle()">Usar sin Calendar (solo historial local)</button>
</div>

<button id="main-btn" onclick="toggleMic()" style="display:none">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="2" width="6" height="12" rx="3"/>
    <path d="M5 10a7 7 0 0 0 14 0"/>
    <line x1="12" y1="17" x2="12" y2="22"/>
    <line x1="8" y1="22" x2="16" y2="22"/>
  </svg>
  <span id="btn-label">Hablar</span>
</button>

<div id="input-area" style="display:none">
  <textarea id="text-input" placeholder="Ej: reunión con el médico mañana a las 11, o llamar al fontanero"></textarea>
  <button id="send-btn" onclick="processInput(document.getElementById('text-input').value)">Enviar</button>
</div>

<div id="status"></div>

<div id="history" style="display:none">
  <h2>Recientes</h2>
  <div id="hist-list"></div>
</div>

<script>
const TODAY = new Date();
const TODAYSTR = TODAY.toISOString().slice(0,10);
let googleToken = localStorage.getItem('google_token') || null;
let tokenExpiry = parseInt(localStorage.getItem('google_token_expiry') || '0');
let recognition = null;
let isListening = false;

function init() {
  if (localStorage.getItem('gcal_setup') === 'done') {
    initGoogleClient(() => getValidToken());
    showApp();
  } else {
    document.getElementById('gcal-setup').style.display = 'flex';
  }
  loadHistory();
}

function skipGoogle() {
  localStorage.setItem('gcal_setup','skip');
  document.getElementById('gcal-setup').style.display = 'none';
  showApp();
}

let googleClient = null;

function initGoogleClient(callback) {
  if (!window.google?.accounts?.oauth2) {
    setTimeout(() => initGoogleClient(callback), 500); return;
  }
  googleClient = google.accounts.oauth2.initTokenClient({
    client_id: '833209240344-smg7hj29eac0bn5gk1i9cdma5j3e8v9s.apps.googleusercontent.com',
    scope: 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks',
    prompt: '',
    callback: (r) => {
      if (r.error) { if (callback) callback(null); return; }
      googleToken = r.access_token;
      tokenExpiry = Date.now() + (r.expires_in - 60) * 1000;
      localStorage.setItem('gcal_setup', 'done');
      localStorage.setItem('google_token', googleToken);
      localStorage.setItem('google_token_expiry', tokenExpiry);
      document.getElementById('gcal-setup').style.display = 'none';
      showApp();
      if (callback) callback(r.access_token);
    }
  });
}

function connectGoogle() {
  if (!googleClient) { initGoogleClient(() => googleClient?.requestAccessToken({prompt: 'consent'})); return; }
  googleClient.requestAccessToken({prompt: 'consent'});
}

async function getValidToken() {
  if (googleToken && Date.now() < tokenExpiry) return googleToken;
  return new Promise((resolve) => {
    if (!googleClient) { initGoogleClient((t) => resolve(t)); return; }
    googleClient.callback = (r) => {
      if (r.error) { resolve(null); return; }
      googleToken = r.access_token;
      tokenExpiry = Date.now() + (r.expires_in - 60) * 1000;
      localStorage.setItem('google_token', googleToken);
      localStorage.setItem('google_token_expiry', String(tokenExpiry));
      resolve(googleToken);
    };
    googleClient.requestAccessToken({prompt: ''});
  });
}

function showApp() {
  document.getElementById('main-btn').style.display = 'flex';
  document.getElementById('input-area').style.display = 'flex';
  document.getElementById('history').style.display = 'flex';
}

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = cls;
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    setStatus('Usa el campo de texto.', 'error'); return;
  }
  if (isListening) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-ES'; recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('main-btn').classList.add('listening');
    document.getElementById('btn-label').textContent = 'Escuchando…';
    setStatus('Habla ahora…', 'processing');
  };
  recognition.onresult = (e) => {
    const txt = e.results[0][0].transcript;
    document.getElementById('text-input').value = txt;
    processInput(txt);
  };
  recognition.onerror = () => { setStatus('Error de micrófono.', 'error'); stopMic(); };
  recognition.onend = () => stopMic();
  recognition.start();
}

function stopMic() {
  isListening = false;
  document.getElementById('main-btn').classList.remove('listening');
  document.getElementById('btn-label').textContent = 'Hablar';
}

function classify(text) {
  const t = text.toLowerCase();
  const now = new Date();

  const timeMatch = t.match(/a\s*las\s*(\d{1,2})(?::(\d{2}))?|(\d{1,2})(?::(\d{2}))?\s*h\b/);
  let hour = null, min = 0;
  if (timeMatch) {
    hour = parseInt(timeMatch[1] || timeMatch[3]);
    min = parseInt(timeMatch[2] || timeMatch[4] || 0);
    if ((t.includes('tarde') || t.includes('pm')) && hour < 12) hour += 12;
    if (t.includes('noche') && hour < 12) hour += 12;
  }

  let date = new Date(now);
  if (t.includes('mañana') && !t.includes('de la mañana')) { date.setDate(date.getDate()+1); }
  else if (t.includes('pasado mañana')) { date.setDate(date.getDate()+2); }
  else if (t.match(/lunes|el lunes/)) setNextWeekday(date,1);
  else if (t.match(/martes/)) setNextWeekday(date,2);
  else if (t.match(/miércoles|miercoles/)) setNextWeekday(date,3);
  else if (t.match(/jueves/)) setNextWeekday(date,4);
  else if (t.match(/viernes/)) setNextWeekday(date,5);
  else if (t.match(/sábado|sabado/)) setNextWeekday(date,6);
  else if (t.match(/domingo/)) setNextWeekday(date,0);

  const dateStr = date.toISOString().slice(0,10);
  const isEvent = hour !== null || t.match(/reunión|reunion|cita|visita|llamada|viaje|vuelo|médico|medico|dentista|cumpleaños|cumpleanos|evento|partido/);

  let start = null, end = null, allDay = true;
  if (hour !== null) {
    allDay = false;
    const pad = n => String(n).padStart(2,'0');
    const ds = date.toISOString().slice(0,10);
    start = `${ds}T${pad(hour)}:${pad(min)}:00`;
    const endHour = hour + 1;
    end = `${ds}T${pad(endHour)}:${pad(min)}:00`;
  }

  const title = text.charAt(0).toUpperCase() + text.slice(1);
  return { type: isEvent ? 'event' : 'task', title, date: dateStr, time: hour !== null ? `${String(hour).padStart(2,'0')}:${String(min).padStart(2,'0')}` : null, start, end, allDay };
}

function setNextWeekday(date, wd) {
  const d = date.getDay();
  let diff = wd - d;
  if (diff <= 0) diff += 7;
  date.setDate(date.getDate() + diff);
}

async function processInput(text) {
  text = text.trim(); if (!text) return;
  document.getElementById('send-btn').disabled = true;
  setStatus('Clasificando…', 'processing');

  const parsed = classify(text);

  if (localStorage.getItem('gcal_setup') === 'done' && googleToken) {
    await saveToCalendar(parsed, text);
  } else if (localStorage.getItem('gcal_setup') === 'done' && !googleToken) {
    connectGoogle();
  } else {
    addToHistory(parsed);
    saveHistory(parsed);
    document.getElementById('text-input').value = '';
    document.getElementById('send-btn').disabled = false;
    setStatus('✓ Guardado en historial local', 'success');
    setTimeout(() => setStatus(''), 3000);
  }
}

async function saveToCalendar(parsed, originalText) {
  try {
    if (parsed.type === 'task') {
      const body = { title: parsed.title, notes: originalText };
      if (parsed.date) body.due = parsed.date + 'T00:00:00.000Z';
      const r = await fetch('https://tasks.googleapis.com/tasks/v1/lists/@default/tasks', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer '+googleToken, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error();
      addToHistory(parsed); saveHistory(parsed);
      document.getElementById('text-input').value = '';
      document.getElementById('send-btn').disabled = false;
      setStatus('✓ Guardado en Google Tasks', 'success');
      setTimeout(() => setStatus(''), 4000);
    } else {
      let body = { summary: parsed.title, description: originalText };
      if (parsed.allDay) {
        body.start = { date: parsed.date }; body.end = { date: parsed.date };
      } else {
        body.start = { dateTime: parsed.start, timeZone: 'Europe/Madrid' };
        body.end   = { dateTime: parsed.end,   timeZone: 'Europe/Madrid' };
      }
      const token = await getValidToken();
      if (!token) throw new Error('No token');
      const r = await fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer '+token, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error();
      addToHistory(parsed); saveHistory(parsed);
      document.getElementById('text-input').value = '';
      document.getElementById('send-btn').disabled = false;
      setStatus('✓ Guardado en Google Calendar', 'success');
      setTimeout(() => setStatus(''), 4000);
    }
  } catch(e) {
    addToHistory(parsed); saveHistory(parsed);
    document.getElementById('text-input').value = '';
    document.getElementById('send-btn').disabled = false;
    setStatus('Guardado localmente (reconecta Google)', 'error');
    setTimeout(() => setStatus(''), 5000);
  }
}

function saveHistory(item) {
  const h = JSON.parse(localStorage.getItem('history')||'[]');
  h.unshift(item); if(h.length>20) h.pop();
  localStorage.setItem('history', JSON.stringify(h));
}

function loadHistory() {
  const h = JSON.parse(localStorage.getItem('history')||'[]');
  h.slice(0,5).forEach(addToHistory);
}

function addToHistory(p) {
  const list = document.getElementById('hist-list');
  const item = document.createElement('div');
  item.className = 'hist-item';
  const meta = [p.date, p.time].filter(Boolean).join(' · ') || 'Sin fecha';
  item.innerHTML = `
    <div class="hist-icon ${p.type}">${p.type==='event'?'📅':'✅'}</div>
    <div class="hist-text">
      <div class="hist-title">${p.title}</div>
      <div class="hist-meta">${meta}</div>
      <span class="hist-type ${p.type}">${p.type==='event'?'Evento':'Tarea'}</span>
    </div>`;
  list.insertBefore(item, list.firstChild);
  if (list.children.length > 5) list.removeChild(list.lastChild);
}

document.getElementById('text-input').addEventListener('keydown', (e) => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); processInput(e.target.value); }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
}
init();
</script>
<script src="https://accounts.google.com/gsi/client" async></script>
</body>
</html>
